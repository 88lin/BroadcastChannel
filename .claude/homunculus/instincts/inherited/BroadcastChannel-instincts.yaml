# BroadcastChannel Workflow Refactor Timeline Pagination Logic

## Action

Follow the refactor-timeline-pagination-logic workflow:
1. Update src/lib/telegram/index.ts to change pagination logic and cursor encoding.
2. Modify src/components/list.astro and/or src/pages/[cursor].astro (before/after) to use the new pagination logic.
3. Update src/types.ts if new types or cursor formats are introduced.
4. Test and adjust behavior on the homepage (src/pages/index.astro) and multi-channel views.
5. Add fallback and edge-case handling for pagination stability.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/lib/telegram/index.ts, src/components/list.astro, src/pages/after/[cursor].astro

